<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seating Chart</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f4f4;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            margin: 20px;
        }

        .selection-form {
            flex: 1 1 50%;
            padding: 20px;
            box-sizing: border-box;
        }

        .seating-chart {
            flex: 1 1 50%;
        }

        .selection-form form {
            display: flex;
            flex-direction: column;
        }

        .selection-form label {
            margin-bottom: 10px;
            font-weight: bold;
        }

        .selection-form select,
        .selection-form input[type="checkbox"] {
            margin-bottom: 20px;
        }

        .acknowledge {
            display: flex;
            align-items: center;
        }

        .acknowledge label {
            margin-left: 10px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            border: none;
            background-color: #333;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #555;
        }

        .seating-chart path {
            stroke: black;
            stroke-width: 0px;
            transition: fill 0.3s;
        }

        .seating-chart path:hover {
            fill: lightblue;
            cursor: pointer;
        }

        .seat-number {
            font-size: 12px;
            text-anchor: middle;
            dominant-baseline: middle;
            fill: black;
        }

        #seat-display {
            margin-top: 20px;
        }

        @media (max-width: 768px) {

            .seating-chart,
            .selection-form {
                flex: 1 1 100%;
            }
        }
    </style>
</head>

        <div class="selection-form">
            <form>
                <div class="flex flex-col">
                    <div>
                        <label for="gate">Gate</label>
                        <select id="gate" name="gate">
                            <option value="">Please select gate</option>
                            <option value="A">A</option>
                            <option value="B">B</option>
                        </select>
                    </div>
                    <div>
                        <label for="type">Type</label>
                        <select id="type" name="type">
                            <option value="">Please select type</option>
                        </select>
                    </div>
                    <div>
                        <label for="level">Level</label>
                        <select id="level" name="level">
                            <option value="">Please select Level</option>
                        </select>
                    </div>
                    <div>
                        <label for="section">Seating Section</label>
                        <select id="section" name="section">
                            <option value="">Please select Section</option>
                        </select>
                    </div>
                </div>

                <div class="acknowledge">
                    <input type="checkbox" id="acknowledge" name="acknowledge">
                    <label for="acknowledge">I acknowledge that if the seat at the section I selected is not available,
                        I may be assigned a different seat at another section.</label>
                </div>

                <button type="submit">Continue</button>
                <button type="button">Cancel</button>
            </form>

            <!-- Seating display -->
            <div id="seat-display"></div>
        </div>
    </div>

    <script>
        const gateTypeMap = {
            A: {
                Premium: { level: 2, sections: ['233', '232', '231', '230'] },
                Grandstand: { level: 1, sections: ['134', '133', '132', '222'] },
                Home: { level: 3, sections: ['301B', '334', '333', '332'] }
            },
            B: {
                'Ultra Malaya': { level: 1, sections: ['103', '104', '105', '106', '107', '108', '109'] },
                Home: {
                    1: ['101', '102'],
                    2: ['201A', '202', '203', '204', '205', '206', '207'],
                    3: ['301A', '302', '303', '304', '305', '306', '307', '308', '309']
                }
            }
        };

        // Reset all paths to default color
        function resetPaths() {
            document.querySelectorAll('.seating-chart path').forEach(function (path) {
                path.style.fill = '#ccc';
            });
        }

        // Highlight all sections of the selected gate
        function highlightGateSections(gate) {
            resetPaths();
            document.querySelectorAll(`[id^="gate-${gate}"]`).forEach(function (path) {
                path.style.fill = 'yellow';
            });
        }

        // Handle gate selection
        document.getElementById('gate').addEventListener('change', function () {
            const selectedGate = this.value;
            const typeSelect = document.getElementById('type');
            typeSelect.innerHTML = ''; // Clear current options

            if (selectedGate && gateTypeMap[selectedGate]) {
                Object.keys(gateTypeMap[selectedGate]).forEach(function (type) {
                    const option = document.createElement('option');
                    option.value = type;
                    option.textContent = type;
                    typeSelect.appendChild(option);
                });

                // Highlight all sections for the selected gate
                highlightGateSections(selectedGate);
            }

            // Reset level and section selections
            document.getElementById('level').innerHTML = '<option value="">Please select Level</option>';
            document.getElementById('section').innerHTML = '<option value="">Please select Section</option>';
        });

        // Handle type selection with auto-selection for level and section
        document.getElementById('type').addEventListener('change', function () {
            const selectedGate = document.getElementById('gate').value;
            const selectedType = this.value;
            const levelSelect = document.getElementById('level');
            const sectionSelect = document.getElementById('section');
            const gateLevelData = gateTypeMap[selectedGate][selectedType];

            levelSelect.innerHTML = ''; // Clear current options
            sectionSelect.innerHTML = ''; // Clear current options

            if (gateLevelData && typeof gateLevelData.level === 'number') {
                // Auto-select the level
                levelSelect.innerHTML = `<option value="${gateLevelData.level}">Level ${gateLevelData.level}</option>`;
                // Auto-select the first section
                gateLevelData.sections.forEach(function (section, index) {
                    const option = document.createElement('option');
                    option.value = section;
                    option.textContent = section;
                    sectionSelect.appendChild(option);
                    if (index === 0) {
                        sectionSelect.value = section; // Auto-select the first section
                    }
                });
                updateColor(selectedGate, gateLevelData.level, sectionSelect.value);
            } else if (gateLevelData && typeof gateLevelData === 'object') {
                Object.keys(gateLevelData).forEach(function (level, index) {
                    const option = document.createElement('option');
                    option.value = level;
                    option.textContent = `Level ${level}`;
                    levelSelect.appendChild(option);
                    if (index === 0) {
                        levelSelect.value = level; // Auto-select the first level
                    }
                });

                const firstLevelSections = gateLevelData[levelSelect.value];
                firstLevelSections.forEach(function (section, index) {
                    const option = document.createElement('option');
                    option.value = section;
                    option.textContent = section;
                    sectionSelect.appendChild(option);
                    if (index === 0) {
                        sectionSelect.value = section; // Auto-select the first section
                    }
                });
                updateColor(selectedGate, levelSelect.value, sectionSelect.value);
            }
        });

        // Handle level and section change
        document.getElementById('level').addEventListener('change', function () {
            const selectedGate = document.getElementById('gate').value;
            const selectedType = document.getElementById('type').value;
            const selectedLevel = this.value;
            const sectionSelect = document.getElementById('section');
            const gateLevelData = gateTypeMap[selectedGate][selectedType][selectedLevel];

            sectionSelect.innerHTML = ''; // Clear current options

            if (gateLevelData) {
                gateLevelData.forEach(function (section, index) {
                    const option = document.createElement('option');
                    option.value = section;
                    option.textContent = section;
                    sectionSelect.appendChild(option);
                    if (index === 0) {
                        sectionSelect.value = section; // Auto-select the first section
                    }
                });
                updateColor(selectedGate, selectedLevel, sectionSelect.value);
            }
        });

        // Handle section selection and update color automatically
        function updateColor(gate, level, section) {
            resetPaths(); // Reset colors first
            const selectedPath = document.getElementById(`gate-${gate}-level-${level}-section-${section}`);
            if (selectedPath) {
                selectedPath.style.fill = 'orange';
            }
        }

        document.getElementById('section').addEventListener('change', function () {
            const selectedGate = document.getElementById('gate').value;
            const selectedLevel = document.getElementById('level').value;
            const selectedSection = this.value;
            updateColor(selectedGate, selectedLevel, selectedSection);
        });
    </script>
</body>

</html>
